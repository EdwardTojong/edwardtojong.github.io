<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Secret Door | Edward Tojong</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a0f0a 0%, #0d0805 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            position: relative;
            overflow-x: hidden;
        }

        /* Wood grain texture overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(45deg, rgba(139, 69, 19, 0.05) 0px, rgba(139, 69, 19, 0.05) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        /* Main door container */
        .door-container {
            position: relative;
            z-index: 10;
            perspective: 1200px;
        }

        .door {
            width: 500px;
            height: 700px;
            background: linear-gradient(110deg, #5c3a1e 0%, #3d2612 50%, #5c3a1e 100%);
            border-radius: 12px;
            position: relative;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), inset 0 1px 4px rgba(255, 255, 255, 0.1);
            transition: transform 0.6s ease;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        /* Wood panels */
        .door::before {
            content: "";
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            background: repeating-linear-gradient(90deg, 
                transparent, 
                transparent 30px, 
                rgba(0, 0, 0, 0.1) 30px, 
                rgba(0, 0, 0, 0.1) 32px);
        }

        /* Vertical wood planks illusion */
        .door::after {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            transform: translateX(-50%);
        }

        /* Iron hinges */
        .hinge {
            position: absolute;
            width: 60px;
            height: 30px;
            background: #2a2a2a;
            border-radius: 4px;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.2), 0 2px 5px black;
        }
        .hinge-top { top: 60px; left: -30px; }
        .hinge-bottom { bottom: 60px; left: -30px; }

        /* Doorknob (lion-head ring) */
        .doorknob {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #d4af37, #8b6914);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.4);
            z-index: 20;
        }
        .doorknob:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
        }
        .doorknob:active {
            transform: translateY(-50%) scale(0.98);
        }
        .doorknob.disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.3);
        }
        .doorknob span {
            font-size: 2.5rem;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        /* Modal / Quiz overlay */
        .quiz-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .quiz-container {
            background: #1e1a16;
            border-radius: 24px;
            max-width: 800px;
            width: 90%;
            padding: 2rem;
            border: 1px solid #d4af37;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            color: #f0e6d0;
            font-family: 'Georgia', serif;
        }
        .quiz-question {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid #d4af37;
            padding-left: 1rem;
        }

        /* QUESTION 1: 6 blank spaces (letter boxes) */
        .letter-boxes {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 2rem 0;
            flex-wrap: wrap;
        }
        .letter-box {
            width: 60px;
            height: 70px;
            background: #2c241e;
            border: 2px solid #d4af37;
            border-radius: 12px;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            color: #f0e6d0;
            text-transform: lowercase;
            font-family: monospace;
            transition: all 0.2s;
        }
        .letter-box:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 10px gold;
            background: #3a2e24;
        }
        .letter-box.correct-flash {
            background: #2a6b2a;
            border-color: #88ff88;
            animation: flashGreen 0.3s ease;
        }
        @keyframes flashGreen {
            0% { background: #2c241e; border-color: #d4af37; }
            50% { background: #44ff44; border-color: white; color: black; }
            100% { background: #2c241e; border-color: #d4af37; }
        }

        /* Map styling */
        .map-container {
            margin: 1.5rem 0;
            text-align: center;
        }
        .world-map {
            width: 100%;
            max-width: 700px;
            height: auto;
            background: #2a5a6a;
            border-radius: 16px;
            border: 2px solid #d4af37;
            cursor: pointer;
        }
        .country-highlight {
            filter: drop-shadow(0 0 8px gold);
            transition: filter 0.3s;
        }

        .quiz-options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .quiz-option {
            background: #2c241e;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #d4af37;
            font-weight: bold;
        }
        .quiz-option:hover {
            background: #4a3a2a;
            transform: scale(1.02);
        }

        /* Piano styles */
        .piano-area {
            margin: 1.5rem 0;
            text-align: center;
        }
        .piano-keys {
            display: flex;
            justify-content: center;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        .piano-key {
            width: 70px;
            height: 160px;
            background: white;
            border: 1px solid #333;
            border-radius: 0 0 8px 8px;
            margin: 0 1px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 12px;
            cursor: pointer;
            transition: 0.1s;
            position: relative;
        }
        .piano-key:hover {
            background: #f0f0f0;
            transform: translateY(-4px);
        }
        .piano-key.selected {
            background: gold;
            box-shadow: 0 0 20px gold;
        }
        .composer-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 8px;
            border: 1px solid #333;
        }
        .feedback {
            margin-top: 1rem;
            font-size: 1.1rem;
            text-align: center;
        }
        .feedback-success {
            color: #88ff88;
        }
        .feedback-error {
            color: #ff8888;
        }
    </style>
</head>
<body>

<div class="door-container">
    <div class="door" id="door">
        <div class="hinge hinge-top"></div>
        <div class="hinge hinge-bottom"></div>
        <div class="doorknob" id="doorknob">
            <span>⚜️</span>
        </div>
    </div>
</div>

<!-- Quiz Modal -->
<div id="quizModal" class="quiz-overlay">
    <div class="quiz-container" id="quizContainer">
        <!-- Dynamic content -->
    </div>
</div>

<script>
    // ---------- QUIZ STATE ----------
    let currentStep = 1;  // 1,2,3
    let doorLocked = false;
    let chopinAudio = null;

    const doorKnob = document.getElementById('doorknob');
    const modal = document.getElementById('quizModal');
    const quizContainer = document.getElementById('quizContainer');

    function initAudio() {
        chopinAudio = new Audio('chopin-tristesse.mp3');
        chopinAudio.loop = false;
    }

    function disableDoor() {
        doorLocked = true;
        doorKnob.classList.add('disabled');
    }

    function closeModalAndReset() {
        modal.style.display = 'none';
        currentStep = 1;
        if (chopinAudio) chopinAudio.pause();
    }

    function failQuiz(message) {
        alert(message || "Oops. Not today. That was an easy one.");
        closeModalAndReset();
        disableDoor();
    }

    function unlockSecretResume() {
        window.location.href = 'secret-resume.html';
    }

    // -------- QUESTION 1: CAMERA with 6 letter boxes ----------
    function renderQuestion1() {
        quizContainer.innerHTML = `
            <div class="quiz-question">❓ This word comes from the Latin meaning "wall" but in English came to be something quite different.</div>
            <div class="letter-boxes" id="letterBoxes">
                ${Array(6).fill().map((_, i) => `<input type="text" class="letter-box" maxlength="1" id="box${i}" data-index="${i}">`).join('')}
            </div>
            <div id="q1Feedback" class="feedback"></div>
        `;
        
        const boxes = document.querySelectorAll('.letter-box');
        // Auto-focus first box
        boxes[0].focus();
        
        // Handle input: move to next box automatically
        boxes.forEach((box, idx) => {
            box.addEventListener('input', (e) => {
                if (box.value.length === 1) {
                    if (idx < 5) boxes[idx + 1].focus();
                }
            });
            
            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && box.value.length === 0 && idx > 0) {
                    boxes[idx - 1].focus();
                }
                if (e.key === 'Enter') {
                    checkCameraAnswer();
                }
            });
        });
        
        // Listen for when all boxes are filled
        const checkAllFilled = () => {
            let allFilled = true;
            let word = '';
            boxes.forEach(box => {
                if (!box.value) allFilled = false;
                word += box.value.toLowerCase();
            });
            if (allFilled && word.length === 6) {
                checkCameraAnswer();
            }
        };
        
        function checkCameraAnswer() {
            let word = '';
            boxes.forEach(box => word += box.value.toLowerCase());
            if (word === 'camera') {
                // Correct! Flash green and proceed
                boxes.forEach(box => box.classList.add('correct-flash'));
                document.getElementById('q1Feedback').innerHTML = '<span class="feedback-success">✓ Correct! Camera it is. 📸</span>';
                // Flash white effect
                document.body.style.transition = '0.1s';
                document.body.style.backgroundColor = 'white';
                setTimeout(() => document.body.style.backgroundColor = '', 200);
                setTimeout(() => {
                    currentStep = 2;
                    renderQuestion2();
                }, 800);
            } else if (word.length === 6) {
                failQuiz("Oops. Not today. That was an easy one.");
            }
        }
        
        // Add event listeners to boxes for real-time check
        boxes.forEach(box => {
            box.addEventListener('input', checkAllFilled);
        });
    }

    // -------- QUESTION 2: FULL WORLD MAP QUIZ ----------
    const countryList = [
        { name: "Brazil", x: 400, y: 280, options: ["Brazil", "Argentina", "Peru", "Colombia"] },
        { name: "Japan", x: 650, y: 220, options: ["Japan", "China", "Korea", "Thailand"] },
        { name: "France", x: 420, y: 180, options: ["France", "Germany", "Spain", "Italy"] },
        { name: "Australia", x: 680, y: 380, options: ["Australia", "New Zealand", "Indonesia", "Papua New Guinea"] },
        { name: "Canada", x: 280, y: 120, options: ["Canada", "USA", "Mexico", "Greenland"] },
        { name: "India", x: 540, y: 240, options: ["India", "Pakistan", "Bangladesh", "Sri Lanka"] },
        { name: "South Africa", x: 460, y: 380, options: ["South Africa", "Namibia", "Botswana", "Zimbabwe"] },
        { name: "Egypt", x: 470, y: 250, options: ["Egypt", "Libya", "Sudan", "Algeria"] }
    ];
    let currentCountry = null;
    let currentOptions = [];

    function renderQuestion2() {
        // Pick random country
        const randomIndex = Math.floor(Math.random() * countryList.length);
        currentCountry = countryList[randomIndex];
        // Shuffle options
        currentOptions = [...currentCountry.options];
        for (let i = currentOptions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentOptions[i], currentOptions[j]] = [currentOptions[j], currentOptions[i]];
        }
        
        // SVG World Map (large, with country borders)
        const mapSvg = `<svg viewBox="0 0 800 450" class="world-map" id="worldMapSvg">
            <rect width="800" height="450" fill="#1a4a5a" stroke="#d4af37" stroke-width="2"/>
            <!-- Continents / simplified borders -->
            <path d="M200,100 L250,80 L300,110 L320,150 L280,180 L240,170 L200,140 Z" fill="#3a7a6a" stroke="#ffd700" stroke-width="1.5" opacity="0.8"/>
            <path d="M320,130 L380,100 L440,120 L460,160 L430,200 L370,190 L340,160 Z" fill="#3a7a6a" stroke="#ffd700" stroke-width="1.5" opacity="0.8"/>
            <path d="M450,150 L520,110 L600,130 L630,170 L590,210 L530,200 L480,180 Z" fill="#3a7a6a" stroke="#ffd700" stroke-width="1.5" opacity="0.8"/>
            <path d="M600,140 L680,100 L740,120 L750,160 L720,190 L660,180 L620,160 Z" fill="#3a7a6a" stroke="#ffd700" stroke-width="1.5" opacity="0.8"/>
            <path d="M300,250 L360,220 L420,240 L440,290 L400,330 L340,310 L310,280 Z" fill="#3a7a6a" stroke="#ffd700" stroke-width="1.5" opacity="0.8"/>
            <path d="M450,260 L510,230 L570,250 L580,300 L540,340 L480,330 L460,290 Z" fill="#3a7a6a" stroke="#ffd700" stroke-width="1.5" opacity="0.8"/>
            <path d="M580,280 L640,260 L690,290 L700,340 L660,370 L600,350 L590,310 Z" fill="#3a7a6a" stroke="#ffd700" stroke-width="1.5" opacity="0.8"/>
            <path d="M250,350 L320,320 L380,340 L390,390 L350,420 L290,400 L260,370 Z" fill="#3a7a6a" stroke="#ffd700" stroke-width="1.5" opacity="0.8"/>
            <circle cx="${currentCountry.x}" cy="${currentCountry.y}" r="15" fill="gold" stroke="#ff6600" stroke-width="2" class="country-highlight" id="highlightCircle"/>
            <text x="${currentCountry.x}" y="${currentCountry.y - 18}" fill="white" font-size="12" text-anchor="middle" font-weight="bold">❓</text>
        </svg>`;
        
        let optionsHtml = '';
        currentOptions.forEach(opt => {
            optionsHtml += `<div class="quiz-option" data-country="${opt}">${opt}</div>`;
        });
        
        quizContainer.innerHTML = `
            <div class="quiz-question">🌍 Name this country (the gold circle shows you where to look)</div>
            <div class="map-container">
                ${mapSvg}
            </div>
            <div class="quiz-options" id="mapOptions">${optionsHtml}</div>
            <div id="mapFeedback" class="feedback"></div>
        `;
        
        // Attach event listeners to options
        document.querySelectorAll('.quiz-option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                const selected = opt.getAttribute('data-country');
                if (selected === currentCountry.name) {
                    document.getElementById('mapFeedback').innerHTML = '<span class="feedback-success">✓ Correct! Well done. 🌍</span>';
                    setTimeout(() => {
                        currentStep = 3;
                        renderQuestion3();
                    }, 800);
                } else {
                    failQuiz("Sorry, not this time. Wrong country.");
                }
            });
        });
    }

    // -------- QUESTION 3: CHOPIN PIANO WITH FACES (NO NAMES) ----------
    // You will replace these with your actual portrait images
    const composerImages = [
        "mozart.jpg", "schubert.jpg", "bach.jpg", "beethoven.jpg", 
        "mozart2.jpg", "tchaikovsky.jpg", "chopin.jpg", "vivaldi.jpg"
    ];
    
    function renderQuestion3() {
        initAudio();
        let pianoHtml = `<div class="quiz-question">🎹 Can you name the composer of this piece? (Click the correct piano key)</div>
        <div class="piano-area">
            <div class="piano-keys" id="pianoKeys">`;
        
        const noteNames = ['C', 'D', 'E', 'F', 'G', 'A', 'B', 'C2'];
        for (let i = 0; i < 8; i++) {
            pianoHtml += `<div class="piano-key" data-composer-index="${i}" data-note="${noteNames[i]}">
                <img src="${composerImages[i]}" class="composer-img" onerror="this.src='https://via.placeholder.com/50?text=?'" style="width:50px;height:50px;border-radius:50%;object-fit:cover;">
            </div>`;
        }
        pianoHtml += `</div><div id="pianoFeedback" class="feedback"></div>`;
        quizContainer.innerHTML = pianoHtml;
        
        const keys = document.querySelectorAll('.piano-key');
        keys.forEach((key, idx) => {
            key.addEventListener('click', () => {
                keys.forEach(k => k.classList.remove('selected'));
                key.classList.add('selected');
                // Chopin is at index 6 (7th key)
                if (idx === 6) {
                    if (chopinAudio) {
                        chopinAudio.play().catch(e => console.log("Autoplay blocked, click again", e));
                    }
                    document.getElementById('pianoFeedback').innerHTML = '<span class="feedback-success">🎉 Awesome! You recognized Chopin. Unlocking the Secret Resume...</span>';
                    document.body.style.background = "radial-gradient(circle, #ffddaa, #ffaa44)";
                    setTimeout(() => {
                        unlockSecretResume();
                    }, 1500);
                } else {
                    failQuiz("Sorry, not this time. The door closes.");
                }
            });
        });
    }

    function startQuiz() {
        if (doorLocked) return;
        modal.style.display = 'flex';
        currentStep = 1;
        renderQuestion1();
    }

    doorKnob.addEventListener('click', startQuiz);
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModalAndReset();
    });
</script>
</body>
</html>
