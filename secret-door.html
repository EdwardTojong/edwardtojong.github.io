<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Secret Door | Edward Tojong</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a0f0a 0%, #0d0805 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(45deg, rgba(139, 69, 19, 0.05) 0px, rgba(139, 69, 19, 0.05) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.3) 0px, rgba(0,0,0,0.3) 2px, transparent 2px, transparent 30px);
            pointer-events: none;
            z-index: 0;
        }

        .door-container {
            position: relative;
            z-index: 10;
            perspective: 1200px;
            display: flex;
            gap: 0;
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.6);
            border-radius: 16px;
        }

        .door-left, .door-right {
            width: 280px;
            height: 600px;
            background: linear-gradient(110deg, #5c3a1e 0%, #3d2612 50%, #5c3a1e 100%);
            position: relative;
            transition: all 0.6s ease;
        }

        .door-left { border-radius: 16px 0 0 16px; border-right: 2px solid #2a1a0a; }
        .door-right { border-radius: 0 16px 16px 0; border-left: 2px solid #2a1a0a; }

        .door-left::before, .door-right::before {
            content: "";
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            background: repeating-linear-gradient(90deg, transparent, transparent 30px, rgba(0, 0, 0, 0.1) 30px, rgba(0, 0, 0, 0.1) 32px);
        }

        .door-left::after, .door-right::after {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            transform: translateX(-50%);
        }

        .hinge {
            position: absolute;
            width: 50px;
            height: 25px;
            background: #2a2a2a;
            border-radius: 4px;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.2), 0 2px 5px black;
        }
        .hinge-left-top { top: 60px; left: -25px; }
        .hinge-left-bottom { bottom: 60px; left: -25px; }
        .hinge-right-top { top: 60px; right: -25px; }
        .hinge-right-bottom { bottom: 60px; right: -25px; }

        .center-doorknob {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 35% 35%, #d4af37, #8b6914);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6), inset 0 1px 3px rgba(255,255,255,0.5);
            z-index: 30;
            border: 2px solid #ffd700;
        }
        .center-doorknob:hover { transform: translate(-50%, -50%) scale(1.08); box-shadow: 0 0 25px rgba(212, 175, 55, 0.9); }
        .center-doorknob.disabled { opacity: 0.5; pointer-events: none; filter: grayscale(0.4); }
        .center-doorknob span { font-size: 3rem; }

        .quiz-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        .quiz-container {
            background: #1e1a16;
            border-radius: 24px;
            max-width: 900px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            border: 2px solid #d4af37;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            color: #f0e6d0;
            font-family: 'Georgia', serif;
        }
        .quiz-question {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid #d4af37;
            padding-left: 1rem;
        }

        /* QUESTION 1: Letter boxes */
        .letter-boxes {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 2rem 0;
            flex-wrap: wrap;
        }
        .letter-box {
            width: 60px;
            height: 70px;
            background: #2c241e;
            border: 2px solid #d4af37;
            border-radius: 12px;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            color: #f0e6d0;
            text-transform: lowercase;
            font-family: monospace;
        }
        .letter-box:focus { outline: none; border-color: #ffd700; box-shadow: 0 0 10px gold; }

        /* MAP STYLES - Millionaire style */
        .map-container {
            margin: 1.5rem 0;
            text-align: center;
            background: #0d2b36;
            border-radius: 20px;
            padding: 1rem;
            border: 2px solid #d4af37;
        }
        .highlight-map {
            width: 100%;
            max-width: 700px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .millionaire-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 2rem 0;
        }
        .millionaire-option {
            background: linear-gradient(145deg, #0a2850, #041a33);
            padding: 1rem 1.5rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid #d4af37;
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
            color: #ffd966;
        }
        .millionaire-option:hover {
            background: linear-gradient(145deg, #1e4a7a, #0a2a4a);
            transform: scale(1.02);
            border-color: #ffd700;
        }

        /* PIANO STYLES */
        .piano-area {
            margin: 1.5rem 0;
            text-align: center;
            background: linear-gradient(145deg, #2a2018, #1a120c);
            padding: 2rem 1rem;
            border-radius: 30px;
            border: 1px solid #d4af37;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.3);
            position: relative;
        }
        .piano-area::before {
            content: "⚜️";
            position: absolute;
            top: -15px;
            left: 20px;
            font-size: 2rem;
            opacity: 0.6;
        }
        .piano-area::after {
            content: "⚜️";
            position: absolute;
            top: -15px;
            right: 20px;
            font-size: 2rem;
            opacity: 0.6;
        }
        .piano-keys {
            display: flex;
            justify-content: center;
            margin: 1rem auto;
            position: relative;
            width: fit-content;
            background: #0a0604;
            padding: 20px 10px 10px 10px;
            border-radius: 12px;
        }
        .piano-key {
            width: 85px;
            height: 220px;
            background: linear-gradient(145deg, #fff8f0, #e8e0d0);
            border: 1px solid #888;
            border-radius: 0 0 12px 12px;
            margin: 0 1px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 15px;
            cursor: pointer;
            transition: 0.1s;
            position: relative;
            z-index: 1;
        }
        .piano-key:hover { background: #fffae8; transform: translateY(-4px); }
        .piano-key.selected { background: radial-gradient(circle at 30% 30%, gold, #d4af37); box-shadow: 0 0 25px gold; }
        .black-key {
            width: 50px;
            height: 130px;
            background: linear-gradient(145deg, #1a1a1a, #2a2a2a);
            margin-left: -30px;
            margin-right: -30px;
            z-index: 2;
            border-radius: 0 0 6px 6px;
        }
        .composer-img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 2px solid #d4af37;
            background: white;
        }
        .feedback { margin-top: 1rem; font-size: 1.1rem; text-align: center; }
        .feedback-success { color: #88ff88; }
        .feedback-error { color: #ff8888; }
        .audio-play-btn {
            background: #d4af37;
            color: #1e1a16;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin: 1rem auto;
            display: block;
        }
    </style>
</head>
<body>

<div class="door-container">
    <div class="door-left"></div>
    <div class="door-right"></div>
    <div class="center-doorknob" id="doorknob"><span>⚜️</span></div>
</div>

<div id="quizModal" class="quiz-overlay">
    <div class="quiz-container" id="quizContainer"></div>
</div>

<script>
    let currentStep = 1;
    let doorLocked = false;
    let chopinAudio = null;
    const doorknob = document.getElementById('doorknob');
    const modal = document.getElementById('quizModal');
    const quizContainer = document.getElementById('quizContainer');

    const composerImages = ["mozart.jpg", "schubert.jpg", "bach.jpg", "beethoven.jpg", "mozart2.jpg", "tchaikovsky.jpg", "chopin.jpg", "vivaldi.jpg"];

    function disableDoor() { doorLocked = true; doorknob.classList.add('disabled'); }
    function closeModalAndReset() { modal.style.display = 'none'; currentStep = 1; if (chopinAudio) { chopinAudio.pause(); chopinAudio.currentTime = 0; } }
    function failQuiz(msg) { alert(msg || "❌ The door remains sealed."); closeModalAndReset(); disableDoor(); }
    function unlockSecretResume() { window.location.href = 'secret-resume.html'; }

    // ---------- QUESTION 1 ----------
    function renderQuestion1() {
        quizContainer.innerHTML = `
            <div class="quiz-question">❓ This word comes from the Latin meaning "dark room" but in English came to mean something else.</div>
            <div class="letter-boxes" id="letterBoxes">
                ${Array(6).fill().map((_, i) => `<input type="text" class="letter-box" maxlength="1" id="box${i}">`).join('')}
            </div>
            <div id="q1Feedback" class="feedback"></div>
        `;
        const boxes = document.querySelectorAll('.letter-box');
        boxes[0].focus();
        boxes.forEach((box, idx) => {
            box.addEventListener('input', () => { if (box.value.length === 1 && idx < 5) boxes[idx + 1].focus(); });
            box.addEventListener('keydown', (e) => { if (e.key === 'Backspace' && box.value.length === 0 && idx > 0) boxes[idx - 1].focus(); });
        });
        function check() {
            let word = ''; boxes.forEach(b => word += b.value.toLowerCase());
            if (word.length === 6) {
                if (word === 'camera') {
                    boxes.forEach(b => b.style.background = '#2a6b2a');
                    document.getElementById('q1Feedback').innerHTML = '<span class="feedback-success">✓ Correct! 📸</span>';
                    setTimeout(() => { currentStep = 2; renderQuestion2(); }, 800);
                } else failQuiz("❌ Not today.");
            }
        }
        boxes.forEach(box => box.addEventListener('input', check));
    }

    // ---------- QUESTION 2: MILLIONAIRE STYLE MAP ----------
    const countries = [
        { name: "Brazil", mapImage: "https://upload.wikimedia.org/wikipedia/commons/0/05/Brazil_in_the_world_%28W3_SVG%29.svg" },
        { name: "Japan", mapImage: "https://upload.wikimedia.org/wikipedia/commons/9/97/Japan_in_the_world_%28W3_SVG%29.svg" },
        { name: "France", mapImage: "https://upload.wikimedia.org/wikipedia/commons/6/64/France_in_the_world_%28W3_SVG%29.svg" },
        { name: "Australia", mapImage: "https://upload.wikimedia.org/wikipedia/commons/8/88/Australia_in_the_world_%28W3_SVG%29.svg" },
        { name: "Canada", mapImage: "https://upload.wikimedia.org/wikipedia/commons/d/d9/Canada_in_the_world_%28W3_SVG%29.svg" },
        { name: "India", mapImage: "https://upload.wikimedia.org/wikipedia/commons/8/8c/India_in_the_world_%28W3_SVG%29.svg" },
        { name: "Egypt", mapImage: "https://upload.wikimedia.org/wikipedia/commons/2/2f/Egypt_in_the_world_%28W3_SVG%29.svg" },
        { name: "South Africa", mapImage: "https://upload.wikimedia.org/wikipedia/commons/7/79/South_Africa_in_the_world_%28W3_SVG%29.svg" }
    ];
    let currentCountryObj = null;
    let currentOptionsArr = [];

    function renderQuestion2() {
        const randomIndex = Math.floor(Math.random() * countries.length);
        currentCountryObj = countries[randomIndex];
        let allCountryNames = countries.map(c => c.name);
        let others = allCountryNames.filter(n => n !== currentCountryObj.name);
        others = others.sort(() => 0.5 - Math.random()).slice(0, 3);
        currentOptionsArr = [currentCountryObj.name, ...others].sort(() => 0.5 - Math.random());

        quizContainer.innerHTML = `
            <div class="quiz-question">🌍 Which country is highlighted in GOLD on the map?</div>
            <div class="map-container">
                <img src="${currentCountryObj.mapImage}" class="highlight-map" style="border: 4px solid gold; box-shadow: 0 0 20px gold;">
            </div>
            <div class="millionaire-options">
                ${currentOptionsArr.map(opt => `<div class="millionaire-option" data-country="${opt}">${opt}</div>`).join('')}
            </div>
            <div id="mapFeedback" class="feedback"></div>
        `;
        document.querySelectorAll('.millionaire-option').forEach(opt => {
            opt.addEventListener('click', () => {
                if (opt.getAttribute('data-country') === currentCountryObj.name) {
                    document.getElementById('mapFeedback').innerHTML = '<span class="feedback-success">✓ Correct! 🌍</span>';
                    setTimeout(() => { currentStep = 3; renderQuestion3(); }, 800);
                } else failQuiz("❌ Wrong country.");
            });
        });
    }

    // ---------- QUESTION 3: AUDIO + PIANO ----------
    function renderQuestion3() {
        chopinAudio = new Audio('chopin-tristesse.mp3');
        chopinAudio.loop = false;
        
        function generatePianoHtml() {
            let html = '<div class="piano-keys">';
            const whiteKeys = ['C', 'D', 'E', 'F', 'G', 'A', 'B', 'C2'];
            const blackPos = [1, 2, 4, 5, 6];
            for (let i = 0; i < whiteKeys.length; i++) {
                html += `<div class="piano-key" data-idx="${i}"><img src="${composerImages[i]}" class="composer-img" onerror="this.src='https://via.placeholder.com/55?text=?'"></div>`;
                if (blackPos.includes(i) && i < whiteKeys.length-1) html += `<div class="piano-key black-key"></div>`;
            }
            html += '</div>';
            return html;
        }

        quizContainer.innerHTML = `
            <div class="quiz-question" id="listeningPrompt" style="text-align:center; border-left:none;">🎵 Press PLAY to hear the piece...</div>
            <button class="audio-play-btn" id="playAudioBtn">▶ PLAY CHOPIN</button>
            <div class="piano-area" style="opacity:0.4; pointer-events:none;" id="pianoArea">
                ${generatePianoHtml()}
            </div>
            <div id="pianoFeedback" class="feedback"></div>
        `;

        const playBtn = document.getElementById('playAudioBtn');
        let audioPlayed = false;
        let loopCount = 0;

        playBtn.addEventListener('click', () => {
            if (audioPlayed) return;
            chopinAudio.currentTime = 0;
            chopinAudio.play().catch(e => alert("Click again to play audio"));
            document.getElementById('listeningPrompt').innerHTML = '🎵 Listening... 🎵';
            audioPlayed = true;
            
            const onEnded = () => {
                loopCount++;
                if (loopCount < 2) {
                    chopinAudio.currentTime = 0;
                    chopinAudio.play();
                } else {
                    chopinAudio.removeEventListener('ended', onEnded);
                    document.getElementById('listeningPrompt').innerHTML = '🎹 Can you name the composer of this piece?';
                    document.getElementById('pianoArea').style.opacity = '1';
                    document.getElementById('pianoArea').style.pointerEvents = 'auto';
                    document.getElementById('pianoFeedback').innerHTML = 'Click the correct composer portrait on the piano.';
                    enablePianoKeys();
                }
            };
            chopinAudio.addEventListener('ended', onEnded);
        });

        function enablePianoKeys() {
            const whiteKeys = document.querySelectorAll('.piano-key:not(.black-key)');
            whiteKeys.forEach((key, idx) => {
                key.style.cursor = 'pointer';
                key.addEventListener('click', () => {
                    if (idx === 6) {
                        document.getElementById('pianoFeedback').innerHTML = '<span class="feedback-success">🎉 Magnificent! Unlocking the Secret Resume...</span>';
                        setTimeout(() => unlockSecretResume(), 1500);
                    } else {
                        failQuiz("❌ Wrong composer. The door seals shut.");
                    }
                });
            });
        }
    }

    function startQuiz() { if (!doorLocked) { modal.style.display = 'flex'; renderQuestion1(); } }
    doorknob.addEventListener('click', startQuiz);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModalAndReset(); });
</script>
</body>
</html>
