<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Secret Door | Edward Tojong</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a0f0a 0%, #0d0805 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            position: relative;
            overflow-x: hidden;
        }

        /* Wood grain texture overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(45deg, rgba(139, 69, 19, 0.05) 0px, rgba(139, 69, 19, 0.05) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        /* Main door container */
        .door-container {
            position: relative;
            z-index: 10;
            perspective: 1200px;
        }

        .door {
            width: 500px;
            height: 700px;
            background: linear-gradient(110deg, #5c3a1e 0%, #3d2612 50%, #5c3a1e 100%);
            border-radius: 12px;
            position: relative;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), inset 0 1px 4px rgba(255, 255, 255, 0.1);
            transition: transform 0.6s ease;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        /* Wood panels */
        .door::before {
            content: "";
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            background: repeating-linear-gradient(90deg, 
                transparent, 
                transparent 30px, 
                rgba(0, 0, 0, 0.1) 30px, 
                rgba(0, 0, 0, 0.1) 32px);
        }

        /* Vertical wood planks illusion */
        .door::after {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            transform: translateX(-50%);
        }

        /* Iron hinges */
        .hinge {
            position: absolute;
            width: 60px;
            height: 30px;
            background: #2a2a2a;
            border-radius: 4px;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.2), 0 2px 5px black;
        }
        .hinge-top { top: 60px; left: -30px; }
        .hinge-bottom { bottom: 60px; left: -30px; }

        /* Doorknob (lion-head ring) */
        .doorknob {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #d4af37, #8b6914);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.4);
            z-index: 20;
        }
        .doorknob:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
        }
        .doorknob:active {
            transform: translateY(-50%) scale(0.98);
        }
        .doorknob.disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.3);
        }
        .doorknob span {
            font-size: 2.5rem;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        /* Modal / Quiz overlay */
        .quiz-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .quiz-container {
            background: #1e1a16;
            border-radius: 24px;
            max-width: 600px;
            width: 90%;
            padding: 2rem;
            border: 1px solid #d4af37;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            color: #f0e6d0;
            font-family: 'Georgia', serif;
        }
        .quiz-question {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid #d4af37;
            padding-left: 1rem;
        }
        .quiz-input {
            width: 100%;
            padding: 0.8rem;
            background: #2c241e;
            border: 1px solid #d4af37;
            color: white;
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin: 1rem 0;
        }
        .quiz-option {
            background: #2c241e;
            padding: 0.8rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .quiz-option:hover {
            background: #4a3a2a;
            border-color: #d4af37;
        }
        .quiz-next {
            background: #d4af37;
            color: #1e1a16;
            border: none;
            padding: 0.8rem 2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            border-radius: 40px;
        }
        .map-image {
            width: 100%;
            border-radius: 12px;
            margin: 1rem 0;
            border: 1px solid #d4af37;
        }
        .piano-area {
            margin: 1rem 0;
            text-align: center;
        }
        .piano-keys {
            display: flex;
            justify-content: center;
            margin: 1rem 0;
        }
        .piano-key {
            width: 50px;
            height: 150px;
            background: white;
            border: 1px solid #333;
            border-radius: 0 0 6px 6px;
            margin: 0 1px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 10px;
            cursor: pointer;
            transition: 0.1s;
        }
        .piano-key.black-key {
            background: #111;
            width: 35px;
            height: 90px;
            margin-left: -18px;
            margin-right: -18px;
            z-index: 2;
        }
        .composer-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 5px;
        }
        .piano-key.selected {
            background: gold;
            box-shadow: 0 0 20px gold;
        }
        .feedback-error {
            color: #ff8888;
            margin-top: 1rem;
        }
        .feedback-success {
            color: #88ff88;
        }
    </style>
</head>
<body>

<div class="door-container">
    <div class="door" id="door">
        <div class="hinge hinge-top"></div>
        <div class="hinge hinge-bottom"></div>
        <div class="doorknob" id="doorknob">
            <span>⚜️</span>
        </div>
    </div>
</div>

<!-- Quiz Modal -->
<div id="quizModal" class="quiz-overlay">
    <div class="quiz-container" id="quizContainer">
        <!-- Dynamic content -->
    </div>
</div>

<script>
    // ---------- QUIZ STATE ----------
    let currentStep = 1;  // 1,2,3
    let doorLocked = false;
    const doorKnob = document.getElementById('doorknob');
    const doorDiv = document.getElementById('door');
    const modal = document.getElementById('quizModal');
    const quizContainer = document.getElementById('quizContainer');

    // Audio for Chopin (you will provide the mp3)
    let chopinAudio = null;
    function initAudio() {
        chopinAudio = new Audio('chopin-tristesse.mp3');
        chopinAudio.loop = false;
    }

    // Helper: disable door permanently
    function disableDoor() {
        doorLocked = true;
        doorKnob.classList.add('disabled');
    }

    // Helper: close modal and reset step
    function closeModalAndReset() {
        modal.style.display = 'none';
        currentStep = 1;
        if (chopinAudio) chopinAudio.pause();
    }

    // Show error and close door
    function failQuiz(message) {
        alert(message || "Oops. Not today. That was an easy one.");
        closeModalAndReset();
        // Also gray out door permanently? only if final fail? Actually we gray out only if they fail completely.
        // But per spec: wrong answer -> close door and gray out button.
        disableDoor();
        // also play door slam sound (optional simple web audio)
        // We'll just rely on visual.
    }

    // Successfully finish all questions -> redirect to secret resume
    function unlockSecretResume() {
        // Play triumphant sound (optional)
        // Redirect
        window.location.href = 'secret-resume.html';
    }

    // -------- QUESTION 1: CAMERA ----------
    function renderQuestion1() {
        quizContainer.innerHTML = `
            <div class="quiz-question">❓ This word comes from the Latin meaning "wall" but in English came to be something quite different.</div>
            <input type="text" id="answer1" class="quiz-input" placeholder="6 letters..." maxlength="6" autocomplete="off">
            <button id="submit1" class="quiz-next">Enter →</button>
            <div id="feedback1"></div>
        `;
        const submitBtn = document.getElementById('submit1');
        const inputField = document.getElementById('answer1');
        const checkAnswer = () => {
            const ans = inputField.value.trim().toLowerCase();
            if (ans === 'camera') {
                // Correct: flash effect + camera shutter
                const feedback = document.getElementById('feedback1');
                feedback.innerHTML = '<span class="feedback-success">✓ Correct! Camera it is. 📸</span>';
                // Flash white effect
                document.body.style.transition = '0.1s';
                document.body.style.backgroundColor = 'white';
                setTimeout(() => document.body.style.backgroundColor = '', 200);
                // Play shutter sound (simple beep? we'll skip audio to keep simple)
                setTimeout(() => {
                    currentStep = 2;
                    renderQuestion2();
                }, 800);
            } else {
                failQuiz("Oops. Not today. That was an easy one.");
            }
        };
        submitBtn.onclick = checkAnswer;
        inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter') checkAnswer(); });
    }

    // -------- QUESTION 2: RANDOM MAP QUIZ ----------
    // Predefined list of countries with multiple choice
    const countryList = [
        { name: "Brazil", options: ["Brazil", "Argentina", "Peru", "Colombia"] },
        { name: "Japan", options: ["Japan", "China", "Korea", "Thailand"] },
        { name: "France", options: ["France", "Germany", "Spain", "Italy"] },
        { name: "Australia", options: ["Australia", "New Zealand", "Indonesia", "Papua New Guinea"] },
        { name: "Canada", options: ["Canada", "USA", "Mexico", "Greenland"] },
        { name: "India", options: ["India", "Pakistan", "Bangladesh", "Sri Lanka"] },
        { name: "South Africa", options: ["South Africa", "Namibia", "Botswana", "Zimbabwe"] },
        { name: "Egypt", options: ["Egypt", "Libya", "Sudan", "Algeria"] }
    ];
    let currentCountry = null;
    let currentOptions = [];

    function renderQuestion2() {
        // pick random country
        const randomIndex = Math.floor(Math.random() * countryList.length);
        currentCountry = countryList[randomIndex];
        // shuffle options
        currentOptions = [...currentCountry.options];
        for (let i = currentOptions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentOptions[i], currentOptions[j]] = [currentOptions[j], currentOptions[i]];
        }
        // simple map SVG placeholder (blank world map with borders)
        // We'll use a data:image/svg+xml with simplified world map outlines
        const mapSvg = `<svg viewBox="0 0 800 400" style="width:100%; background:#1a3a4a; border-radius:12px;">
            <rect width="800" height="400" fill="#2a5a6a" rx="8"/>
            <text x="400" y="200" fill="white" font-size="16" text-anchor="middle">🗺️ Blank world map (country borders shown but no labels)</text>
            <!-- We'll simulate the map with a placeholder but highlight country on correct answer? For simplicity, we'll show the map and ask to select correct option -->
        </svg>`;
        let optionsHtml = '';
        currentOptions.forEach(opt => {
            optionsHtml += `<div class="quiz-option" data-country="${opt}">${opt}</div>`;
        });
        quizContainer.innerHTML = `
            <div class="quiz-question">🌍 Name this country (the map highlights the correct region after your answer)</div>
            <div class="map-image" id="mapPlaceholder">${mapSvg}</div>
            <div class="quiz-options" id="mapOptions">${optionsHtml}</div>
            <div id="mapFeedback"></div>
        `;
        // Attach event listeners
        document.querySelectorAll('.quiz-option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                const selected = opt.getAttribute('data-country');
                if (selected === currentCountry.name) {
                    // Correct: highlight map (change svg fill for that region would be heavy, but we can show a zoom effect)
                    const mapDiv = document.getElementById('mapPlaceholder');
                    mapDiv.innerHTML = `<svg viewBox="0 0 800 400" style="width:100%; background:#2a8a6a; border-radius:12px;">
                        <rect width="800" height="400" fill="#2a8a6a" rx="8"/>
                        <text x="400" y="200" fill="gold" font-size="24" text-anchor="middle">✓ ${currentCountry.name} ✓</text>
                        <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="0.3s"/>
                    </svg>`;
                    document.getElementById('mapFeedback').innerHTML = '<span class="feedback-success">Correct! +1</span>';
                    setTimeout(() => {
                        currentStep = 3;
                        renderQuestion3();
                    }, 1000);
                } else {
                    failQuiz("Sorry, not this time. Wrong country.");
                }
            });
        });
    }

    // -------- QUESTION 3: CHOPIN PIANO WITH FACES (NO NAMES) ----------
    // Composer portraits (you will replace with your own images)
    const composerImages = [
        "mozart.jpg", "schubert.jpg", "bach.jpg", "beethoven.jpg", 
        "mozart2.jpg", "tchaikovsky.jpg", "chopin.jpg", "vivaldi.jpg"
    ];
    // We'll use placeholder images with data:image? but you will replace actual files.
    // To make it work out-of-box, I'll generate colored circles with first letter.
    // But for your final, replace src with your own portrait images.
    function renderQuestion3() {
        initAudio();
        let pianoHtml = `<div class="quiz-question">🎹 Can you name the composer of this piece? (Click the correct piano key)</div>
        <div class="piano-area">
            <audio id="chopinAudioPlayer" src="chopin-tristesse.mp3" preload="auto"></audio>
            <div class="piano-keys" id="pianoKeys">`;
        // Generate 8 white keys (C D E F G A B C) each with a composer face (no names)
        const noteNames = ['C', 'D', 'E', 'F', 'G', 'A', 'B', 'C2'];
        for (let i = 0; i < 8; i++) {
            pianoHtml += `<div class="piano-key" data-composer-index="${i}" data-note="${noteNames[i]}">
                <img src="${composerImages[i]}" class="composer-img" onerror="this.src='https://via.placeholder.com/40?text=?'" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">
            </div>`;
        }
        pianoHtml += `</div><div id="pianoFeedback"></div>`;
        quizContainer.innerHTML = pianoHtml;
        // Attach click to each key
        const keys = document.querySelectorAll('.piano-key');
        keys.forEach((key, idx) => {
            key.addEventListener('click', () => {
                // Highlight selected
                keys.forEach(k => k.classList.remove('selected'));
                key.classList.add('selected');
                // Check if this is the Chopin key (index 6: the 7th key, Chopin)
                if (idx === 6) { // chopin position
                    // Play Chopin audio
                    const audio = document.getElementById('chopinAudioPlayer');
                    audio.play().catch(e => console.log("Autoplay blocked, click again", e));
                    // Show success and unlock
                    document.getElementById('pianoFeedback').innerHTML = '<span class="feedback-success">🎉 Awesome! You recognized Chopin. Unlocking the Secret Resume...</span>';
                    // Sunlight effect
                    document.body.style.background = "radial-gradient(circle, #ffddaa, #ffaa44)";
                    setTimeout(() => {
                        unlockSecretResume();
                    }, 1500);
                } else {
                    failQuiz("Sorry, not this time. The door closes.");
                }
            });
        });
        // also play a short preview? we can just wait for user click.
    }

    // Open modal and start quiz
    function startQuiz() {
        if (doorLocked) return;
        modal.style.display = 'flex';
        currentStep = 1;
        renderQuestion1();
    }

    doorKnob.addEventListener('click', startQuiz);
    // Close modal if clicking outside content? Not required, but nice.
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModalAndReset();
    });

    // Preload audio on user first interaction (since browser blocks autoplay)
    document.body.addEventListener('click', () => {
        if (chopinAudio) chopinAudio.load();
    }, { once: true });
</script>
</body>
</html>
