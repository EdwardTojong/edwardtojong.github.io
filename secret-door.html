<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Secret Door | Edward Tojong</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a0f0a 0%, #0d0805 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            position: relative;
            overflow-x: hidden;
        }

        /* Wood grain texture overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(45deg, rgba(139, 69, 19, 0.05) 0px, rgba(139, 69, 19, 0.05) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        /* Castle wall background effect */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.3) 0px, rgba(0,0,0,0.3) 2px, transparent 2px, transparent 30px);
            pointer-events: none;
            z-index: 0;
        }

        /* Double door container */
        .door-container {
            position: relative;
            z-index: 10;
            perspective: 1200px;
            display: flex;
            gap: 0;
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.6);
            border-radius: 16px;
        }

        /* Left Door */
        .door-left, .door-right {
            width: 280px;
            height: 600px;
            background: linear-gradient(110deg, #5c3a1e 0%, #3d2612 50%, #5c3a1e 100%);
            position: relative;
            transition: all 0.6s ease;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .door-left {
            border-radius: 16px 0 0 16px;
            border-right: 2px solid #2a1a0a;
        }

        .door-right {
            border-radius: 0 16px 16px 0;
            border-left: 2px solid #2a1a0a;
        }

        /* Wood panels on each door */
        .door-left::before, .door-right::before {
            content: "";
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            background: repeating-linear-gradient(90deg, 
                transparent, 
                transparent 30px, 
                rgba(0, 0, 0, 0.1) 30px, 
                rgba(0, 0, 0, 0.1) 32px);
        }

        /* Vertical wood planks illusion */
        .door-left::after, .door-right::after {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            transform: translateX(-50%);
        }

        /* Iron hinges */
        .hinge {
            position: absolute;
            width: 50px;
            height: 25px;
            background: #2a2a2a;
            border-radius: 4px;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.2), 0 2px 5px black;
        }
        .hinge-left-top { top: 60px; left: -25px; }
        .hinge-left-bottom { bottom: 60px; left: -25px; }
        .hinge-right-top { top: 60px; right: -25px; }
        .hinge-right-bottom { bottom: 60px; right: -25px; }

        /* Center Doorknob (shared between both doors) */
        .center-doorknob {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 35% 35%, #d4af37, #8b6914);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6), inset 0 1px 3px rgba(255,255,255,0.5);
            z-index: 30;
            border: 2px solid #ffd700;
        }
        .center-doorknob:hover {
            transform: translate(-50%, -50%) scale(1.08);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.9);
        }
        .center-doorknob:active {
            transform: translate(-50%, -50%) scale(0.96);
        }
        .center-doorknob.disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.4);
        }
        .center-doorknob span {
            font-size: 3rem;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        /* Modal / Quiz overlay */
        .quiz-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        .quiz-container {
            background: #1e1a16;
            border-radius: 24px;
            max-width: 900px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            border: 2px solid #d4af37;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            color: #f0e6d0;
            font-family: 'Georgia', serif;
        }
        .quiz-question {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid #d4af37;
            padding-left: 1rem;
        }

        /* QUESTION 1: Letter boxes */
        .letter-boxes {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 2rem 0;
            flex-wrap: wrap;
        }
        .letter-box {
            width: 60px;
            height: 70px;
            background: #2c241e;
            border: 2px solid #d4af37;
            border-radius: 12px;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            color: #f0e6d0;
            text-transform: lowercase;
            font-family: monospace;
        }
        .letter-box:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 10px gold;
        }

        /* MAP STYLES - Google Maps style static map */
        .map-container {
            margin: 1.5rem 0;
            text-align: center;
            background: #0d2b36;
            border-radius: 20px;
            padding: 1rem;
            border: 2px solid #d4af37;
        }
        .world-map-img {
            width: 100%;
            max-width: 700px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .quiz-options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .quiz-option {
            background: #2c241e;
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #d4af37;
            font-weight: bold;
        }
        .quiz-option:hover {
            background: #4a3a2a;
            transform: scale(1.02);
        }

        /* BAROQUE PIANO STYLES */
        .piano-area {
            margin: 1.5rem 0;
            text-align: center;
            background: linear-gradient(145deg, #2a2018, #1a120c);
            padding: 2rem 1rem;
            border-radius: 30px;
            border: 1px solid #d4af37;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.3);
            position: relative;
        }
        /* Baroque ornamentation */
        .piano-area::before {
            content: "⚜️";
            position: absolute;
            top: -15px;
            left: 20px;
            font-size: 2rem;
            opacity: 0.6;
            transform: rotate(-15deg);
        }
        .piano-area::after {
            content: "⚜️";
            position: absolute;
            top: -15px;
            right: 20px;
            font-size: 2rem;
            opacity: 0.6;
            transform: rotate(15deg);
        }
        .piano-keys {
            display: flex;
            justify-content: center;
            margin: 1rem auto;
            position: relative;
            width: fit-content;
            background: #0a0604;
            padding: 20px 10px 10px 10px;
            border-radius: 12px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 5px 10px rgba(0,0,0,0.3);
        }
        /* White keys */
        .piano-key {
            width: 85px;
            height: 220px;
            background: linear-gradient(145deg, #fff8f0, #e8e0d0);
            border: 1px solid #888;
            border-radius: 0 0 12px 12px;
            margin: 0 1px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 15px;
            cursor: pointer;
            transition: 0.1s;
            position: relative;
            z-index: 1;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .piano-key:hover {
            background: #fffae8;
            transform: translateY(-4px);
        }
        .piano-key.selected {
            background: radial-gradient(circle at 30% 30%, gold, #d4af37);
            box-shadow: 0 0 25px gold;
        }
        /* Black keys */
        .black-key {
            width: 50px;
            height: 130px;
            background: linear-gradient(145deg, #1a1a1a, #2a2a2a);
            margin-left: -30px;
            margin-right: -30px;
            z-index: 2;
            border-radius: 0 0 6px 6px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .black-key:hover {
            background: #3a3a3a;
            transform: translateY(-3px);
        }
        .composer-img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 2px solid #d4af37;
            background: white;
        }
        .feedback {
            margin-top: 1rem;
            font-size: 1.1rem;
            text-align: center;
        }
        .feedback-success {
            color: #88ff88;
        }
        .feedback-error {
            color: #ff8888;
        }
        .baroque-corner {
            position: absolute;
            bottom: 10px;
            left: 20px;
            font-size: 1.2rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>

<div class="door-container">
    <div class="door-left" id="doorLeft">
        <div class="hinge hinge-left-top"></div>
        <div class="hinge hinge-left-bottom"></div>
    </div>
    <div class="door-right" id="doorRight">
        <div class="hinge hinge-right-top"></div>
        <div class="hinge hinge-right-bottom"></div>
    </div>
    <div class="center-doorknob" id="doorknob">
        <span>⚜️</span>
    </div>
</div>

<!-- Quiz Modal -->
<div id="quizModal" class="quiz-overlay">
    <div class="quiz-container" id="quizContainer">
        <!-- Dynamic content -->
    </div>
</div>

<script>
    // ---------- QUIZ STATE ----------
    let currentStep = 1;
    let doorLocked = false;
    let chopinAudio = null;

    const doorknob = document.getElementById('doorknob');
    const modal = document.getElementById('quizModal');
    const quizContainer = document.getElementById('quizContainer');

    function initAudio() {
        chopinAudio = new Audio('chopin-tristesse.mp3');
        chopinAudio.loop = false;
        chopinAudio.volume = 0.8;
    }

    function disableDoor() {
        doorLocked = true;
        doorknob.classList.add('disabled');
        // Also animate doors slightly closed
        document.getElementById('doorLeft').style.opacity = '0.9';
        document.getElementById('doorRight').style.opacity = '0.9';
    }

    function closeModalAndReset() {
        modal.style.display = 'none';
        currentStep = 1;
        if (chopinAudio) chopinAudio.pause();
    }

    function failQuiz(message) {
        alert(message || "❌ The door remains sealed. Not today.");
        closeModalAndReset();
        disableDoor();
    }

    function unlockSecretResume() {
        window.location.href = 'secret-resume.html';
    }

    // -------- QUESTION 1: CAMERA ----------
    function renderQuestion1() {
        quizContainer.innerHTML = `
            <div class="quiz-question">❓ This word comes from the Latin meaning "wall" but in English came to be something quite different.</div>
            <div class="letter-boxes" id="letterBoxes">
                ${Array(6).fill().map((_, i) => `<input type="text" class="letter-box" maxlength="1" id="box${i}" data-index="${i}">`).join('')}
            </div>
            <div id="q1Feedback" class="feedback"></div>
        `;
        
        const boxes = document.querySelectorAll('.letter-box');
        boxes[0].focus();
        
        boxes.forEach((box, idx) => {
            box.addEventListener('input', (e) => {
                if (box.value.length === 1 && idx < 5) boxes[idx + 1].focus();
            });
            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && box.value.length === 0 && idx > 0) boxes[idx - 1].focus();
            });
        });
        
        function checkAnswer() {
            let word = '';
            boxes.forEach(b => word += b.value.toLowerCase());
            if (word.length === 6) {
                if (word === 'camera') {
                    boxes.forEach(b => b.style.background = '#2a6b2a');
                    document.getElementById('q1Feedback').innerHTML = '<span class="feedback-success">✓ Correct! Camera it is. 📸</span>';
                    document.body.style.transition = '0.2s';
                    document.body.style.backgroundColor = 'white';
                    setTimeout(() => document.body.style.backgroundColor = '', 300);
                    setTimeout(() => { currentStep = 2; renderQuestion2(); }, 800);
                } else {
                    failQuiz("❌ Not today. That was an easy one.");
                }
            }
        }
        
        boxes.forEach(box => box.addEventListener('input', checkAnswer));
    }

    // -------- QUESTION 2: MAP QUIZ with Static World Map Image ----------
    const countryList = [
        { name: "Brazil", options: ["Brazil", "Argentina", "Peru", "Colombia"] },
        { name: "Japan", options: ["Japan", "China", "Korea", "Thailand"] },
        { name: "France", options: ["France", "Germany", "Spain", "Italy"] },
        { name: "Australia", options: ["Australia", "New Zealand", "Indonesia", "Papua New Guinea"] },
        { name: "Canada", options: ["Canada", "USA", "Mexico", "Greenland"] },
        { name: "India", options: ["India", "Pakistan", "Bangladesh", "Sri Lanka"] },
        { name: "Egypt", options: ["Egypt", "Libya", "Sudan", "Algeria"] },
        { name: "South Africa", options: ["South Africa", "Namibia", "Botswana", "Zimbabwe"] }
    ];
    let currentCountry = null;
    let currentOptions = [];

    function renderQuestion2() {
        const randomIndex = Math.floor(Math.random() * countryList.length);
        currentCountry = countryList[randomIndex];
        currentOptions = [...currentCountry.options];
        for (let i = currentOptions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentOptions[i], currentOptions[j]] = [currentOptions[j], currentOptions[i]];
        }
        
        // Using a high-quality static world map image (Wikimedia Commons based)
        const mapImageUrl = "https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg";
        
        quizContainer.innerHTML = `
            <div class="quiz-question">🌍 Name this country (click on the correct answer below)</div>
            <div class="map-container">
                <img src="${mapImageUrl}" class="world-map-img" alt="World Map" id="worldMap">
            </div>
            <div class="quiz-options" id="mapOptions">
                ${currentOptions.map(opt => `<div class="quiz-option" data-country="${opt}">${opt}</div>`).join('')}
            </div>
            <div id="mapFeedback" class="feedback"></div>
        `;
        
        document.querySelectorAll('.quiz-option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                const selected = opt.getAttribute('data-country');
                if (selected === currentCountry.name) {
                    document.getElementById('mapFeedback').innerHTML = '<span class="feedback-success">✓ Correct! Well done. 🌍</span>';
                    setTimeout(() => { currentStep = 3; renderQuestion3(); }, 800);
                } else {
                    failQuiz("❌ Wrong country. The door stays shut.");
                }
            });
        });
    }

    // -------- QUESTION 3: BAROQUE PIANO with Black Keys ----------
    const composerImages = [
        "mozart.jpg", "schubert.jpg", "bach.jpg", "beethoven.jpg", 
        "mozart2.jpg", "tchaikovsky.jpg", "chopin.jpg", "vivaldi.jpg"
    ];
    
    function renderQuestion3() {
        initAudio();
        // Create full piano octave: white keys + black keys
        let pianoHtml = `<div class="quiz-question">🎹 Can you name the composer of this piece? (Click the correct piano key)</div>
        <div class="piano-area">
            <div class="piano-keys" id="pianoKeys" style="position: relative; display: flex; justify-content: center;">`;
        
        // White keys (C D E F G A B C)
        const whiteKeys = ['C', 'D', 'E', 'F', 'G', 'A', 'B', 'C2'];
        // Black keys positions: after C, D, F, G, A
        const blackKeyPositions = [1, 2, 4, 5, 6]; // indices after which black keys appear
        
        for (let i = 0; i < whiteKeys.length; i++) {
            pianoHtml += `<div class="piano-key" data-composer-index="${i}" data-note="${whiteKeys[i]}" style="position: relative; z-index: 1;">
                <img src="${composerImages[i]}" class="composer-img" onerror="this.src='https://via.placeholder.com/55?text=?'" style="width:55px;height:55px;border-radius:50%;object-fit:cover;">
            </div>`;
            // Add black key after specific white keys (except E and B)
            if (blackKeyPositions.includes(i) && i < whiteKeys.length - 1) {
                pianoHtml += `<div class="piano-key black-key" style="position: relative; z-index: 2; margin-left: -25px; margin-right: -25px;" data-is-black="true">
                    <div style="height: 100%; width: 100%;"></div>
                </div>`;
            }
        }
        
        pianoHtml += `</div><div id="pianoFeedback" class="feedback"></div>
        <div class="baroque-corner">🎼 baroque · classical · romantic</div>
        </div>`;
        
        quizContainer.innerHTML = pianoHtml;
        
        const whiteKeysOnly = document.querySelectorAll('.piano-key:not(.black-key)');
        whiteKeysOnly.forEach((key, idx) => {
            key.addEventListener('click', () => {
                whiteKeysOnly.forEach(k => k.classList.remove('selected'));
                key.classList.add('selected');
                // Chopin is at index 6 (7th white key)
                if (idx === 6) {
                    if (chopinAudio) {
                        chopinAudio.play().catch(e => {
                            console.log("Autoplay blocked, retry with user interaction");
                            // Fallback: create a play button
                            document.getElementById('pianoFeedback').innerHTML = '<span class="feedback-error">⚠️ Click again to play audio</span>';
                            key.addEventListener('click', () => { chopinAudio.play(); }, { once: true });
                        });
                    }
                    document.getElementById('pianoFeedback').innerHTML = '<span class="feedback-success">🎉 Magnificent! You recognized Chopin. Unlocking the Secret Resume...</span>';
                    document.body.style.background = "radial-gradient(circle, #ffddaa, #d4af37, #8b6914)";
                    setTimeout(() => {
                        unlockSecretResume();
                    }, 1800);
                } else {
                    failQuiz("❌ The wrong key echoes in the chamber. The door seals shut.");
                }
            });
        });
    }

    function startQuiz() {
        if (doorLocked) return;
        modal.style.display = 'flex';
        currentStep = 1;
        renderQuestion1();
    }

    doorknob.addEventListener('click', startQuiz);
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModalAndReset();
    });
</script>
</body>
</html>
