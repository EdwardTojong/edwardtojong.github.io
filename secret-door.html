<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Secret Door | Edward Tojong</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a0f0a 0%, #0d0805 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(45deg, rgba(139, 69, 19, 0.05) 0px, rgba(139, 69, 19, 0.05) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.3) 0px, rgba(0,0,0,0.3) 2px, transparent 2px, transparent 30px);
            pointer-events: none;
            z-index: 0;
        }

        .door-container {
            position: relative;
            z-index: 10;
            perspective: 1200px;
            display: flex;
            gap: 0;
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.6);
            border-radius: 16px;
        }

        .door-left, .door-right {
            width: 280px;
            height: 600px;
            background: linear-gradient(110deg, #5c3a1e 0%, #3d2612 50%, #5c3a1e 100%);
            position: relative;
            transition: all 0.6s ease;
        }

        .door-left { border-radius: 16px 0 0 16px; border-right: 2px solid #2a1a0a; }
        .door-right { border-radius: 0 16px 16px 0; border-left: 2px solid #2a1a0a; }

        .door-left::before, .door-right::before {
            content: "";
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            background: repeating-linear-gradient(90deg, transparent, transparent 30px, rgba(0, 0, 0, 0.1) 30px, rgba(0, 0, 0, 0.1) 32px);
        }

        .door-left::after, .door-right::after {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            transform: translateX(-50%);
        }

        .hinge {
            position: absolute;
            width: 50px;
            height: 25px;
            background: #2a2a2a;
            border-radius: 4px;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.2), 0 2px 5px black;
        }
        .hinge-left-top { top: 60px; left: -25px; }
        .hinge-left-bottom { bottom: 60px; left: -25px; }
        .hinge-right-top { top: 60px; right: -25px; }
        .hinge-right-bottom { bottom: 60px; right: -25px; }

        .center-doorknob {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 35% 35%, #d4af37, #8b6914);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6), inset 0 1px 3px rgba(255,255,255,0.5);
            z-index: 30;
            border: 2px solid #ffd700;
        }
        .center-doorknob:hover { transform: translate(-50%, -50%) scale(1.08); box-shadow: 0 0 25px rgba(212, 175, 55, 0.9); }
        .center-doorknob.disabled { opacity: 0.5; pointer-events: none; filter: grayscale(0.4); }
        .center-doorknob span { font-size: 3rem; }

        .quiz-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        .quiz-container {
            background: #1e1a16;
            border-radius: 24px;
            max-width: 900px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            border: 2px solid #d4af37;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            color: #f0e6d0;
            font-family: 'Georgia', serif;
        }
        
        /* CENTER ALL QUESTION TEXT */
        .quiz-question {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            text-align: center;
            border-left: none;
            padding-left: 0;
        }

        .letter-boxes {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 2rem 0;
            flex-wrap: wrap;
        }
        .letter-box {
            width: 60px;
            height: 70px;
            background: #2c241e;
            border: 2px solid #d4af37;
            border-radius: 12px;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            color: #f0e6d0;
            text-transform: lowercase;
            font-family: monospace;
        }
        .letter-box:focus { outline: none; border-color: #ffd700; box-shadow: 0 0 10px gold; }

        .map-container {
            margin: 1.5rem 0;
            text-align: center;
            background: #0d2b36;
            border-radius: 20px;
            padding: 1rem;
            border: 2px solid #d4af37;
            position: relative;
        }
        .world-map-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 700px;
        }
        .world-map {
            width: 100%;
            border-radius: 12px;
            display: block;
        }
        .gold-pin {
            position: absolute;
            font-size: 1.6rem;
            filter: drop-shadow(0 0 6px #ffd700);
            animation: gentlePulse 1.8s infinite ease-in-out;
            transform: translate(-50%, -50%);
            color: #ffd700;
            text-shadow: 0 0 4px #ffaa00;
        }
        @keyframes gentlePulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.9; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .millionaire-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 2rem 0;
        }
        .millionaire-option {
            background: linear-gradient(145deg, #0a2850, #041a33);
            padding: 1rem 1.5rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid #d4af37;
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
            color: #ffd966;
        }
        .millionaire-option:hover {
            background: linear-gradient(145deg, #1e4a7a, #0a2a4a);
            transform: scale(1.02);
            border-color: #ffd700;
        }

        /* ARTISTIC PIANO PAGE */
        .piano-page {
            position: relative;
            background: linear-gradient(145deg, #1a0f0a, #0a0604);
            border-radius: 30px;
            padding: 2rem 1rem;
            overflow: hidden;
        }
        .floating-note {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.3;
            animation: floatNote 8s infinite linear;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes floatNote {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.2; }
            50% { transform: translateY(-30px) rotate(10deg); opacity: 0.5; }
            100% { transform: translateY(0) rotate(0deg); opacity: 0.2; }
        }
        .angel-left, .angel-right {
            position: absolute;
            top: 20%;
            font-size: 3rem;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }
        .angel-left { left: 10px; transform: rotate(-10deg); }
        .angel-right { right: 10px; transform: rotate(10deg) scaleX(-1); }
        .tapestry-top, .tapestry-bottom {
            position: absolute;
            left: 0;
            right: 0;
            height: 40px;
            background: repeating-linear-gradient(90deg, #8b6914, #d4af37 20px, #8b6914 40px);
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }
        .tapestry-top { top: 0; border-radius: 30px 30px 0 0; }
        .tapestry-bottom { bottom: 0; border-radius: 0 0 30px 30px; }
        
        .piano-area {
            margin: 1.5rem 0;
            text-align: center;
            background: linear-gradient(145deg, #2a2018, #1a120c);
            padding: 2rem 1rem;
            border-radius: 30px;
            border: 1px solid #d4af37;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        .piano-keys {
            display: flex;
            justify-content: center;
            margin: 1rem auto;
            position: relative;
            width: fit-content;
            background: #0a0604;
            padding: 20px 10px 10px 10px;
            border-radius: 12px;
        }
        .piano-key {
            width: 85px;
            height: 220px;
            background: linear-gradient(145deg, #fff8f0, #e8e0d0);
            border: 1px solid #888;
            border-radius: 0 0 12px 12px;
            margin: 0 1px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 15px;
            cursor: pointer;
            transition: 0.1s;
            position: relative;
            z-index: 1;
        }
        .piano-key:hover { background: #fffae8; transform: translateY(-4px); }
        .piano-key.selected { background: radial-gradient(circle at 30% 30%, gold, #d4af37); box-shadow: 0 0 25px gold; }
        .black-key {
            width: 50px;
            height: 130px;
            background: linear-gradient(145deg, #1a1a1a, #2a2a2a);
            margin-left: -30px;
            margin-right: -30px;
            z-index: 2;
            border-radius: 0 0 6px 6px;
        }
        .composer-img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 2px solid #d4af37;
            background: white;
        }
        .feedback { margin-top: 1rem; font-size: 1.1rem; text-align: center; }
        .feedback-success { color: #88ff88; }
        .feedback-error { color: #ff8888; }
        .audio-play-btn {
            background: #d4af37;
            color: #1e1a16;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin: 1rem auto;
            display: block;
            z-index: 2;
            position: relative;
        }
        .instrument-icon {
            position: absolute;
            bottom: 10px;
            left: 20px;
            font-size: 2rem;
            opacity: 0.3;
            pointer-events: none;
        }
        .instrument-icon-right {
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 2rem;
            opacity: 0.3;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="door-container">
    <div class="door-left"></div>
    <div class="door-right"></div>
    <div class="center-doorknob" id="doorknob"><span>⚜️</span></div>
</div>

<div id="quizModal" class="quiz-overlay">
    <div class="quiz-container" id="quizContainer"></div>
</div>

<script>
    let currentStep = 1;
    let doorLocked = false;
    let chopinAudio = null;
    let pianoEnabled = false;
    const doorknob = document.getElementById('doorknob');
    const modal = document.getElementById('quizModal');
    const quizContainer = document.getElementById('quizContainer');

    const composerImages = ["mozart.jpg", "schubert.jpg", "bach.jpg", "beethoven.jpg", "mozart2.jpg", "tchaikovsky.jpg", "chopin.jpg", "vivaldi.jpg"];

    function disableDoor() { doorLocked = true; doorknob.classList.add('disabled'); }
    function closeModalAndReset() { modal.style.display = 'none'; currentStep = 1; if (chopinAudio) { chopinAudio.pause(); chopinAudio.currentTime = 0; } }
    function failQuiz(msg) { alert(msg || "❌ The door remains sealed."); closeModalAndReset(); disableDoor(); }
    function unlockSecretResume() { window.location.href = 'secret-resume.html'; }

    // ========== QUESTION 1 ==========
    function renderQuestion1() {
        quizContainer.innerHTML = `
            <div class="quiz-question">❓ This word comes from the Latin meaning "dark room" but in modern English came to mean something else.</div>
            <div class="letter-boxes" id="letterBoxes">
                ${Array(6).fill().map((_, i) => `<input type="text" class="letter-box" maxlength="1" id="box${i}">`).join('')}
            </div>
            <div id="q1Feedback" class="feedback"></div>
        `;
        const boxes = document.querySelectorAll('.letter-box');
        boxes[0].focus();
        boxes.forEach((box, idx) => {
            box.addEventListener('input', () => { if (box.value.length === 1 && idx < 5) boxes[idx + 1].focus(); });
            box.addEventListener('keydown', (e) => { if (e.key === 'Backspace' && box.value.length === 0 && idx > 0) boxes[idx - 1].focus(); });
        });
        function check() {
            let word = ''; boxes.forEach(b => word += b.value.toLowerCase());
            if (word.length === 6) {
                if (word === 'camera') {
                    boxes.forEach(b => b.style.background = '#2a6b2a');
                    document.getElementById('q1Feedback').innerHTML = '<span class="feedback-success">✓ Correct! 📸</span>';
                    setTimeout(() => { currentStep = 2; renderQuestion2(); }, 800);
                } else failQuiz("❌ Not today.");
            }
        }
        boxes.forEach(box => box.addEventListener('input', check));
    }

    // ========== QUESTION 2: WORLD MAP WITH PIN ON KAZAKHSTAN ==========
    const worldMapUrl = "https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg";
    const correctCountry = "Kazakhstan";
    const countryPool = ["Kazakhstan", "Russia", "China", "Mongolia", "Uzbekistan", "Turkmenistan", "Kyrgyzstan", "Tajikistan"];
    let currentOptions = [];

    function renderQuestion2() {
        let others = countryPool.filter(c => c !== correctCountry);
        others = others.sort(() => 0.5 - Math.random()).slice(0, 3);
        currentOptions = [correctCountry, ...others].sort(() => 0.5 - Math.random());

        // Pin position for Kazakhstan - moved 1cm right + 1cm up
        // Previous: pinX = 61, pinY = 32.5
        // New: +1.5% right, -1.5% up (approximately 1cm each)
        const pinX = 62.5;   
        const pinY = 31;

        quizContainer.innerHTML = `
            <div class="quiz-question">🌍 Which country is marked with the PIN on the map?</div>
            <div class="map-container">
                <div class="world-map-wrapper" style="position: relative; display: inline-block; width: 100%;">
                    <img src="${worldMapUrl}" class="world-map" alt="World Map">
                    <div class="gold-pin" style="left: ${pinX}%; top: ${pinY}%;">📍</div>
                </div>
            </div>
            <div class="millionaire-options">
                ${currentOptions.map(opt => `<div class="millionaire-option" data-country="${opt}">${opt}</div>`).join('')}
            </div>
            <div id="mapFeedback" class="feedback"></div>
        `;
        
        document.querySelectorAll('.millionaire-option').forEach(opt => {
            opt.addEventListener('click', () => {
                if (opt.getAttribute('data-country') === correctCountry) {
                    document.getElementById('mapFeedback').innerHTML = '<span class="feedback-success">✓ Correct! 🌍</span>';
                    setTimeout(() => { currentStep = 3; renderQuestion3(); }, 800);
                } else {
                    failQuiz("❌ Wrong country. The door stays shut.");
                }
            });
        });
    }

    // ========== QUESTION 3: ARTISTIC PIANO ==========
    function renderQuestion3() {
        chopinAudio = new Audio('chopin-tristesse.mp3');
        chopinAudio.loop = false;
        pianoEnabled = false;
        
        function generatePianoHtml() {
            let html = '<div class="piano-keys">';
            const whiteKeys = ['C', 'D', 'E', 'F', 'G', 'A', 'B', 'C2'];
            const blackPos = [1, 2, 4, 5, 6];
            for (let i = 0; i < whiteKeys.length; i++) {
                html += `<div class="piano-key" data-idx="${i}"><img src="${composerImages[i]}" class="composer-img" onerror="this.src='https://via.placeholder.com/55?text=?'"></div>`;
                if (blackPos.includes(i) && i < whiteKeys.length-1) html += `<div class="piano-key black-key"></div>`;
            }
            html += '</div>';
            return html;
        }

        let floatingNotes = '';
        const noteSymbols = ['♪', '♫', '♩', '🎵', '🎶', '🎼'];
        for (let i = 0; i < 12; i++) {
            const left = Math.random() * 90 + 5;
            const delay = Math.random() * 10;
            const duration = 6 + Math.random() * 8;
            floatingNotes += `<div class="floating-note" style="left: ${left}%; bottom: ${Math.random() * 80 + 10}%; animation-duration: ${duration}s; animation-delay: ${delay}s;">${noteSymbols[Math.floor(Math.random() * noteSymbols.length)]}</div>`;
        }

        quizContainer.innerHTML = `
            <div class="piano-page">
                <div class="tapestry-top"></div>
                <div class="tapestry-bottom"></div>
                <div class="angel-left">👼</div>
                <div class="angel-right">👼</div>
                ${floatingNotes}
                <div class="instrument-icon">🎻</div>
                <div class="instrument-icon-right">🎺</div>
                
                <div class="quiz-question" id="listeningPrompt" style="text-align:center; border-left:none; z-index:2; position:relative;">🎹 Can you identify the composer?</div>
                <button class="audio-play-btn" id="playAudioBtn">Play</button>
                <div class="piano-area" id="pianoArea" style="opacity:0.5; pointer-events:none;">
                    ${generatePianoHtml()}
                </div>
                <div id="pianoFeedback" class="feedback"></div>
            </div>
        `;

        const playBtn = document.getElementById('playAudioBtn');
        let audioPlayed = false;
        let loopCount = 0;

        function enablePianoKeys() {
            if (pianoEnabled) return;
            pianoEnabled = true;
            const pianoAreaDiv = document.getElementById('pianoArea');
            if (pianoAreaDiv) {
                pianoAreaDiv.style.opacity = '1';
                pianoAreaDiv.style.pointerEvents = 'auto';
            }
            
            const whiteKeys = document.querySelectorAll('.piano-key:not(.black-key)');
            whiteKeys.forEach((key, idx) => {
                key.style.cursor = 'pointer';
                const newKey = key.cloneNode(true);
                key.parentNode.replaceChild(newKey, key);
                newKey.addEventListener('click', () => {
                    if (!pianoEnabled) return;
                    if (idx === 6) {
                        document.getElementById('pianoFeedback').innerHTML = '<span class="feedback-success">🎉 Magnificent! Unlocking the Secret Resume...</span>';
                        setTimeout(() => unlockSecretResume(), 1500);
                    } else {
                        failQuiz("❌ Wrong composer. The door seals shut.");
                    }
                });
            });
        }

        playBtn.addEventListener('click', () => {
            if (audioPlayed) return;
            
            enablePianoKeys();
            
            chopinAudio.currentTime = 0;
            chopinAudio.play().catch(e => console.log("Audio play error:", e));
            audioPlayed = true;
            
            const onEnded = () => {
                loopCount++;
                if (loopCount < 2) {
                    chopinAudio.currentTime = 0;
                    chopinAudio.play();
                } else {
                    chopinAudio.removeEventListener('ended', onEnded);
                }
            };
            chopinAudio.addEventListener('ended', onEnded);
        });
    }

    function startQuiz() { if (!doorLocked) { modal.style.display = 'flex'; renderQuestion1(); } }
    doorknob.addEventListener('click', startQuiz);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModalAndReset(); });
</script>
</body>
</html>
